<style>

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent} html{height:100%;overscroll-behavior:none} body{min-height:100%;margin:0;font-family:Arial,Helvetica,sans-serif;background:linear-gradient(180deg,#fbfcfa,#edf6f1);color:var(--text);overscroll-behavior:none;touch-action:manipulation} button,input,select,textarea{font-family:inherit} button{cursor:pointer}.hidden{display:none!important}.center{text-align:center}.small{font-size:12px;color:var(--muted)} h1,h2,h3{margin:0 0 6px} p{margin:4px 0} label{display:block;margin:10px 0 5px;font-weight:800;font-size:13px}.logo-img{width:100%;height:100%;object-fit:contain;display:block}.login-wrap{min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:14px}.login-card{width:min(420px,94vw);background:#fff;border-radius:24px;padding:20px;box-shadow:var(--shadow);border:1px solid var(--line)}.logo-box-login{width:144px;height:126px;margin:0 auto 4px}select,input,textarea{width:100%;border:1px solid var(--line);border-radius:13px;padding:11px;background:#fff;font-size:15px;outline:none}textarea{resize:vertical;min-height:72px}input:focus,select:focus,textarea:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(22,130,79,.12)}.pin-row{display:grid;grid-template-columns:1fr 46px;gap:8px}.icon-btn{height:46px;border:1px solid var(--line);border-radius:13px;background:#f8fbf9;color:var(--green);font-weight:900;font-size:17px}.keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:10px}.key{border:1px solid var(--line);background:#fbfdfb;border-radius:13px;padding:12px 0;font-size:18px;font-weight:900;color:#183326}.key:active,.btn:active,.tab:active,.status:active,.check:active{transform:scale(.985)}.btn{border:0;border-radius:13px;padding:11px 12px;font-weight:900;background:var(--green);color:#fff;font-size:14px;min-height:42px}.btn:hover{background:var(--dark)}.btn.full{width:100%}.btn.secondary{background:#eef6f1;color:var(--green)}.btn.warn{background:#fff4e8;color:var(--warn)}.btn.danger{background:#fff1f0;color:var(--danger)}.btn.smallbtn{padding:8px 10px;font-size:12px;border-radius:10px;min-height:34px}.app{max-width:1040px;margin:0 auto;padding:env(safe-area-inset-top) 10px 10px}.header{background:var(--ivory);border-radius:20px;box-shadow:var(--shadow);border:1px solid #eee2c9;padding:9px 12px;display:grid;grid-template-columns:86px 1fr auto;gap:10px;align-items:center;margin-top:8px}.logo-box-header{width:86px;height:74px}.brand{text-align:center}.brand h1{font-size:18px;line-height:1.05;margin:0;color:#111}.powered{color:var(--muted);font-weight:800;font-size:11px}.datetime{font-size:11px;color:var(--muted);margin-top:3px}.userbox{text-align:right;min-width:92px}.user-pill{background:#e7f4e9;border-radius:11px;padding:7px 8px;font-weight:900;text-align:center;margin-bottom:6px;font-size:12px}.tabs{display:flex;gap:6px;margin-top:8px;overflow:auto;padding-bottom:2px}.tab{flex:1;border:1px solid var(--line);background:#fff;border-radius:13px;padding:10px 8px;font-weight:900;white-space:nowrap;font-size:13px;min-height:40px}.tab.active{background:var(--green);color:#fff;border-color:var(--green)}.card{background:#fff;border-radius:18px;border:1px solid var(--line);box-shadow:var(--shadow);padding:14px;margin-top:10px}.segment{display:flex;gap:7px;margin:9px 0}.segment button{flex:1;border:1px solid var(--line);background:#fff;border-radius:13px;padding:10px 8px;font-weight:900;font-size:13px}.segment button.active{background:var(--green);color:#fff;border-color:var(--green)}.status-row{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.status{border:2px solid var(--line);border-radius:13px;padding:11px;text-align:center;font-weight:900;background:#fff;font-size:14px}.status.on{border-color:var(--green);background:var(--soft);color:var(--green)}.details-box{border:1px solid var(--line);border-radius:14px;background:#fff;overflow:hidden;margin-top:9px}.details-head{width:100%;border:0;background:#f8fbf9;padding:11px;display:flex;align-items:center;justify-content:space-between;font-weight:900;color:var(--text);font-size:13px}.count{background:var(--soft);color:var(--green);border-radius:999px;padding:4px 8px;font-size:11px}.details-body{padding:10px;border-top:1px solid var(--line)}.checks{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}.check{border:2px solid var(--line);background:#fff;border-radius:12px;padding:10px 8px;text-align:center;font-weight:900;font-size:13px;min-height:40px}.check.on{border-color:var(--green);background:var(--soft);color:var(--green)}.dashboard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}.metric{border:1px solid var(--line);border-radius:14px;background:#fbfdfb;padding:11px;font-size:12px}.metric strong{display:block;font-size:22px;color:var(--green);margin-top:2px}.entry{border:1px solid var(--line);border-left:5px solid var(--green);border-radius:14px;padding:11px;margin:8px 0;background:#fff}.entry.issue{border-left-color:var(--warn)}.entry-title{font-size:15px;font-weight:900}.badge{display:inline-block;padding:5px 8px;border-radius:999px;background:var(--soft);color:var(--green);font-size:11px;font-weight:900;margin:4px 4px 0 0}.badge.issue{background:#fff4e8;color:var(--warn)}.staff-list,.setup-list{display:grid;gap:8px;margin-top:10px}.staff-card,.setup-card{border:1px solid var(--line);border-radius:13px;padding:10px;background:#fbfdfb;display:flex;justify-content:space-between;gap:8px;align-items:center}.pin-badge{background:#eef6f1;color:#145c39;border-radius:999px;padding:6px 9px;font-weight:900;font-size:12px}.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.add-row{display:grid;grid-template-columns:1fr auto;gap:7px;align-items:end}.add-row.staff{grid-template-columns:1.4fr .8fr .8fr auto}.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}.photo-preview{margin-top:8px;max-width:180px;border-radius:12px;border:1px solid var(--line);display:block}.photo-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center}.photo-label{border:1px solid var(--line);background:#fbfdfb;border-radius:13px;padding:11px;font-weight:900;text-align:center;color:var(--green);font-size:13px}.file-input{display:none}.footer{text-align:center;color:var(--muted);font-size:11px;padding:12px}.toast{position:fixed;left:50%;bottom:calc(16px + env(safe-area-inset-bottom));transform:translateX(-50%);background:#133b29;color:#fff;padding:11px 15px;border-radius:999px;font-weight:900;box-shadow:var(--shadow);display:none;z-index:99;font-size:13px;max-width:92vw}.device-note{background:#f4fbf6;border:1px dashed #99c7ab;border-radius:13px;padding:10px;font-size:12px;color:#315a45;margin-top:10px}.top-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}.empty{padding:12px;border:1px dashed var(--line);border-radius:14px;color:var(--muted);background:#fbfdfb}.modal-backdrop{position:fixed;inset:0;background:rgba(8,25,16,.48);display:flex;align-items:center;justify-content:center;padding:18px;z-index:120}.modal{width:min(420px,94vw);background:#fff;border-radius:20px;padding:16px;border:1px solid var(--line);box-shadow:0 20px 60px rgba(0,0,0,.22)}.modal h3{margin:0 0 8px}.modal-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}.modal-actions.three{grid-template-columns:1fr 1fr 1fr}.report-actions{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}.staff-report-head{display:flex;align-items:center;justify-content:space-between;gap:8px}@media(max-width:760px){.app{padding-left:8px;padding-right:8px}.header{grid-template-columns:68px 1fr auto;border-radius:16px;padding:7px 9px;gap:8px}.logo-box-header{width:68px;height:58px}.brand h1{font-size:15px}.powered,.datetime{font-size:10px}.userbox{min-width:80px}.user-pill{font-size:11px;padding:6px;margin-bottom:5px}.btn{min-height:38px;padding:9px 10px}.card{padding:12px;margin-top:8px;border-radius:16px}.tabs{gap:5px}.tab{min-width:86px;font-size:12px;padding:9px 7px}.dashboard-grid{grid-template-columns:repeat(3,1fr);gap:6px}.metric{padding:9px}.metric strong{font-size:20px}.setup-grid,.add-row,.add-row.staff{grid-template-columns:1fr}.checks{grid-template-columns:repeat(2,1fr)}label{margin-top:8px}.status{padding:10px}.segment button{padding:9px 7px}.logo-box-login{width:128px;height:112px}.login-card{padding:18px}.key{padding:11px 0}.staff-card,.setup-card{align-items:flex-start;flex-direction:column}.row{width:100%}}@media(max-width:380px){.checks{grid-template-columns:1fr}.brand h1{font-size:14px}.dashboard-grid{grid-template-columns:repeat(3,1fr)}.logo-box-header{width:58px;height:50px}.header{grid-template-columns:58px 1fr}.userbox{grid-column:1/-1;display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center;text-align:left}.user-pill{margin-bottom:0}}@media print{.tabs,.btn,.keypad,.login-wrap,.top-actions{display:none!important}.card,.header{box-shadow:none}body{background:#fff}.app{max-width:none}.entry{break-inside:avoid}}
</style>

<body>
<section id="loginScreen" class="login-wrap"><div class="login-card"><div class="logo-box-login"><img class="logo-img" src="logo.svg" alt="CleanOps logo"></div><div class="center"><h1>CleanOps Login</h1><p class="small"></p></div><label>Staff Name</label><select id="loginUser"></select><label>PIN</label><div class="pin-row"><input id="pin" type="password" inputmode="numeric" maxlength="4" placeholder="Enter PIN" autocomplete="off"><button class="icon-btn" onclick="clearPin()">⌫</button></div><div class="keypad"><button class="key" onclick="tapPin('1')">1</button><button class="key" onclick="tapPin('2')">2</button><button class="key" onclick="tapPin('3')">3</button><button class="key" onclick="tapPin('4')">4</button><button class="key" onclick="tapPin('5')">5</button><button class="key" onclick="tapPin('6')">6</button><button class="key" onclick="tapPin('7')">7</button><button class="key" onclick="tapPin('8')">8</button><button class="key" onclick="tapPin('9')">9</button><button class="key" onclick="backspacePin()">←</button><button class="key" onclick="tapPin('0')">0</button><button class="key" onclick="login()">✓</button></div><button class="btn full" style="margin-top:10px" onclick="login()">Login</button></div></section>
<main id="app" class="app hidden"><header class="header"><div class="logo-box-header"><img class="logo-img" src="logo.svg" alt="CleanOps logo"></div><div class="brand"><h1>Karma Tara Residency</h1><div class="powered">Powered by CleanOps</div><div id="dateTime" class="datetime"></div></div><div class="userbox"><div id="userPill" class="user-pill"></div><button class="btn secondary full" onclick="logout()">Logout</button></div></header><nav id="tabs" class="tabs"></nav><section id="content"></section><div class="footer">🏠 Karma Tara Residency · CleanOps V8.1.2 · Daily Workflow Management</div></main><div id="toast" class="toast"></div><div id="modalRoot" class="hidden"></div>
<script>
'use strict';
const defaultUsers=[{name:'Sonam',role:'Admin',pin:'1234'},{name:'Amar',role:'Staff',pin:'1111'},{name:'Kul Bdr.',role:'Staff',pin:'2222'},{name:'Raman',role:'Supervisor',pin:'3333'}];
const defaultRooms=['Everest','Kanchenjunga','Lhotse','Makalu','Cho Oyu','Dhaulagiri','Manaslu','Annapurna','AmaDablam'];
const defaultAreas=['Lobby','Reception','Rooftop','Stairway','Parking','Terrace','Common Bathroom'];
const defaultSuiteTasks=['Change Bed Linen','Change Quilt Cover','Change Pillow Cover','Change Towels','Clean Kitchen','Clean Bathroom','Clean Living Room','Overall Cleaned'];
const defaultSuiteIssues=['Lights','TV','AC','Plumbing','Kitchen','Bathroom','Furniture','Other'];
const defaultAreaTasks=['Lobby Cleaning','Reception Cleaning','Rooftop Cleaning','Stairway Cleaning','Parking Cleaning','Terrace Cleaning','Garbage Collection'];
const defaultAreaIssues=['Lighting','Water Leakage','Furniture Damage','Waste Overflow','Floor Damage','Safety Hazard','Other'];
let users=load('cleanops_v7312_users',defaultUsers),rooms=load('cleanops_v7312_rooms',defaultRooms),areas=load('cleanops_v7312_areas',defaultAreas),suiteTasks=load('cleanops_v7312_suite_tasks',defaultSuiteTasks),suiteIssues=load('cleanops_v7312_suite_issues',defaultSuiteIssues),areaTasks=load('cleanops_v7312_area_tasks',defaultAreaTasks),areaIssues=load('cleanops_v7312_area_issues',defaultAreaIssues),entries=load('cleanops_v7312_entries',[]);
let currentUser=null,currentView='work',entryType='Suite Room',selectedMode=null,selectedTask=[],selectedIssues=[],dropdownOpen=null,selectedSuite=null,selectedArea=null;
function $(id){return document.getElementById(id)}
function load(key,fallback){try{return JSON.parse(localStorage.getItem(key)||JSON.stringify(fallback))}catch(e){return fallback}}
function persist(){localStorage.setItem('cleanops_v7312_users',JSON.stringify(users));localStorage.setItem('cleanops_v7312_rooms',JSON.stringify(rooms));localStorage.setItem('cleanops_v7312_areas',JSON.stringify(areas));localStorage.setItem('cleanops_v7312_suite_tasks',JSON.stringify(suiteTasks));localStorage.setItem('cleanops_v7312_suite_issues',JSON.stringify(suiteIssues));localStorage.setItem('cleanops_v7312_area_tasks',JSON.stringify(areaTasks));localStorage.setItem('cleanops_v7312_area_issues',JSON.stringify(areaIssues));localStorage.setItem('cleanops_v7312_entries',JSON.stringify(entries));}
function esc(s){return String(s??'').replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]))}
function fillUsers(){ $('loginUser').innerHTML=users.map((u,i)=>`<option value="${i}">${esc(u.name)} — ${esc(u.role)}</option>`).join('') }
function showToast(m){const t=$('toast');t.textContent=m;t.style.display='block';clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>t.style.display='none',1800)}
function tapPin(n){if($('pin').value.length<4)$('pin').value+=n} function backspacePin(){$('pin').value=$('pin').value.slice(0,-1)} function clearPin(){$('pin').value=''}
function login(){const u=users[$('loginUser').value];if(!u||$('pin').value!==u.pin){showToast('Incorrect PIN');return}currentUser={...u};sessionStorage.setItem('cleanops_v7312_user',JSON.stringify(currentUser));$('pin').value='';startApp()}
function logout(){sessionStorage.removeItem('cleanops_v7312_user');currentUser=null;$('app').classList.add('hidden');$('loginScreen').classList.remove('hidden')}
function startApp(){$('loginScreen').classList.add('hidden');$('app').classList.remove('hidden');$('userPill').textContent=`${currentUser.name} — ${currentUser.role}`;currentView=currentUser.role==='Staff'?'work':'dashboard';tick();renderTabs();renderContent();protectNavigation()}
function tick(){const now=new Date();if($('dateTime'))$('dateTime').textContent=now.toLocaleDateString()+' | '+now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});const d=now.toDateString();if(d!==appDay){appDay=d; if(currentUser){showToast('New working day started'); renderContent();}}} setInterval(tick,1000);
function hasIssue(e){return (e.status||[]).includes('Issue')||(e.issues||[]).length>0} function todayEntries(){const d=new Date().toDateString();return entries.filter(e=>new Date(e.time).toDateString()===d)} function staffTodayEntries(name){return todayEntries().filter(e=>e.staff===name)} function isTodayEntry(e){return new Date(e.time).toDateString()===new Date().toDateString()}
function renderTabs(){if(currentUser.role==='Staff'){$('tabs').innerHTML='';$('tabs').classList.add('hidden');return} $('tabs').classList.remove('hidden');let list=currentUser.role==='Supervisor'?[['dashboard','Dashboard'],['save','Save']]:[['dashboard','Dashboard'],['setup','Setup'],['save','Save']];$('tabs').innerHTML=list.map(t=>`<button class="tab ${currentView===t[0]?'active':''}" onclick="go('${t[0]}')">${t[1]}</button>`).join('')}
function go(v){currentView=v;renderTabs();renderContent();window.scrollTo({top:0,behavior:'smooth'})}
function renderContent(){if(currentView==='work')return renderWork();if(currentView==='dashboard')return renderDashboard();if(currentView==='reports')return renderReports();if(currentView==='staff')return renderStaff();if(currentView==='setup')return renderSetup();if(currentView==='save')return renderSave()}
function resetEntry(){selectedMode=null;selectedTask=[];selectedIssues=[];dropdownOpen=null}
function getCurrentTasks(){return entryType==='Suite Room'?suiteTasks:areaTasks} function getCurrentIssues(){return entryType==='Suite Room'?suiteIssues:areaIssues}
function setStatus(mode){selectedMode=mode;dropdownOpen=mode.toLowerCase();renderWork()} function stableToggleTask(item){const i=selectedTask.indexOf(item);i>=0?selectedTask.splice(i,1):selectedTask.push(item);renderWork()} function stableToggleIssue(item){const i=selectedIssues.indexOf(item);i>=0?selectedIssues.splice(i,1):selectedIssues.push(item);renderWork()}
function renderStableChecklist(title,mode,items,selected){const open=dropdownOpen===mode,fn=mode==='task'?'stableToggleTask':'stableToggleIssue';return `<div class="details-box"><button type="button" class="details-head" onclick="captureWorkState();dropdownOpen=dropdownOpen==='${mode}'?null:'${mode}';renderWork()"><span>${title}</span><span class="count">${selected.length} selected ${open?'▲':'▼'}</span></button>${open?`<div class="details-body"><div class="checks">${items.map(item=>`<button type="button" class="check ${selected.includes(item)?'on':''}" onclick="${fn}('${esc(String(item)).replace(/&#39;/g,"\\'")}')">${esc(item)}</button>`).join('')}</div></div>`:''}</div>`}
function currentLocation(){return entryType==='Suite Room'?(selectedSuite||rooms[0]||''):(selectedArea||areas[0]||'')}
function setEntryType(type){
  captureWorkState(); entryType=type;
  if(entryType==='Suite Room' && (!selectedSuite || !rooms.includes(selectedSuite))) selectedSuite=rooms[0]||'';
  if(entryType==='Common Area' && (!selectedArea || !areas.includes(selectedArea))) selectedArea=areas[0]||'';
  resetEntry(); renderWork();
}
function captureWorkState(){
 const sel=$('locationSelect'); if(sel){ if(entryType==='Suite Room') selectedSuite=sel.value; else selectedArea=sel.value; }
}
function updateLocation(v){ if(entryType==='Suite Room') selectedSuite=v; else selectedArea=v; }
function renderWork(){
 const list=entryType==='Suite Room'?rooms:areas;
 if(entryType==='Suite Room' && (!selectedSuite || !list.includes(selectedSuite))) selectedSuite=list[0]||'';
 if(entryType==='Common Area' && (!selectedArea || !list.includes(selectedArea))) selectedArea=list[0]||'';
 const selectedLoc=currentLocation();
 const label=entryType==='Suite Room'?'Suite Name':'Common Area';
 $('content').innerHTML=`<div class="card"><div class="staff-report-head"><h2>Work Entry</h2><button type="button" class="btn secondary smallbtn" onclick="renderStaffTodayReport()">View Today Report</button></div><p class="small">Select location, Task or Issue, checklist, then Submit.</p><div class="segment"><button type="button" class="${entryType==='Suite Room'?'active':''}" onclick="setEntryType('Suite Room')">Suite Room</button><button type="button" class="${entryType==='Common Area'?'active':''}" onclick="setEntryType('Common Area')">Common Area</button></div><label>${label}</label><select id="locationSelect" onchange="updateLocation(this.value)">${list.map(x=>`<option ${x===selectedLoc?'selected':''}>${esc(x)}</option>`).join('')}</select><label>Status</label><div class="status-row"><button type="button" class="status ${selectedMode==='Task'?'on':''}" onclick="setStatus('Task')">Task</button><button type="button" class="status ${selectedMode==='Issue'?'on':''}" onclick="setStatus('Issue')">Issue</button></div>${selectedMode==='Task'?renderStableChecklist('Task Checklist','task',getCurrentTasks(),selectedTask):''}${selectedMode==='Issue'?renderStableChecklist('Issue Checklist','issue',getCurrentIssues(),selectedIssues):''}<label>Photo</label><div class="photo-row"><label class="photo-label" for="photoInput">📷 Photo</label><button type="button" class="btn secondary smallbtn" onclick="clearPhoto()">Remove</button></div><input id="photoInput" class="file-input" type="file" accept="image/*" capture="environment" onchange="previewPhoto(event)"><img id="photoPreview" class="photo-preview hidden" alt="Photo preview"><label>Note</label><textarea id="note" rows="3" placeholder="Optional note"></textarea><button type="button" class="btn full" style="margin-top:10px" onclick="submitEntry()">Submit</button></div>`}
function previewPhoto(event){const file=event.target.files&&event.target.files[0],img=$('photoPreview');if(!file||!img)return;const reader=new FileReader();reader.onload=e=>{img.src=e.target.result;img.classList.remove('hidden')};reader.readAsDataURL(file)}
function clearPhoto(){const el=$('photoInput'),img=$('photoPreview');if(el)el.value='';if(img){img.src='';img.classList.add('hidden')}} function readPhoto(){return new Promise(resolve=>{const el=$('photoInput'),file=el&&el.files&&el.files[0];if(!file)return resolve('');const reader=new FileReader();reader.onload=e=>resolve(e.target.result);reader.readAsDataURL(file)})}
async function submitEntry(){captureWorkState();const loc=currentLocation(),note=$('note').value.trim();if(!selectedMode)return showToast('Please select Task or Issue');if(selectedMode==='Task'&&selectedTask.length===0)return showToast('Please select at least one task');if(selectedMode==='Issue'&&selectedIssues.length===0)return showToast('Please select at least one issue');const photo=await readPhoto();entries.push({id:Date.now(),time:new Date().toISOString(),staff:currentUser.name,role:currentUser.role,type:entryType,location:loc,status:[selectedMode],tasks:[...selectedTask],issues:[...selectedIssues],note,photo});persist();resetEntry();showToast('Submitted to Dashboard');renderWork()}
function renderDashboard(){const today=todayEntries(),issues=entries.filter(hasIssue),active=new Set(today.map(e=>e.staff)).size;const adminActions=currentUser.role==='Admin'?`<div class="top-actions"><button class="btn danger smallbtn" onclick="openClearTodayModal()">Clear Today Data</button></div>`:'';$('content').innerHTML=`<div class="card"><h2>${esc(currentUser.role)} Dashboard</h2><p class="small">Live overview from staff submissions.</p><div class="dashboard-grid"><div class="metric">Today<strong>${today.length}</strong></div><div class="metric">Issues<strong>${issues.length}</strong></div><div class="metric">Staff<strong>${active}</strong></div></div>${adminActions}</div>${entryList(today.slice(-6).reverse(),'Latest Today')}`}

function renderStaffTodayReport(){
 const list=staffTodayEntries(currentUser.name).slice().reverse();
 $('content').innerHTML=`<div class="card"><div class="staff-report-head"><div><h2>${esc(currentUser.name)} — Today Report</h2><p class="small">Only your own submissions for today. This view automatically clears after midnight.</p></div><button class="btn secondary smallbtn" onclick="currentView='work';renderWork()">Back</button></div></div>${entryList(list,'My Today Report')}`;
 window.scrollTo({top:0,behavior:'smooth'});
}
function openClearTodayModal(){
 if(currentUser.role!=='Admin')return showToast('Admin only');
 const today=todayEntries();
 if(!today.length)return showToast('No today data to clear');
 $('modalRoot').className='modal-backdrop';
 $('modalRoot').innerHTML=`<div class="modal"><h3>Backup Warning</h3><p><b>Please backup today’s data before clearing.</b></p><p class="small">This will remove today’s entries and today’s reports from this device. Older history will remain.</p><div class="modal-actions three"><button class="btn secondary smallbtn" onclick="backupTodayJSON()">Backup First</button><button class="btn smallbtn" onclick="closeModal()">Cancel</button><button class="btn danger smallbtn" onclick="confirmClearToday()">Confirm Clear</button></div></div>`;
}
function closeModal(){ $('modalRoot').className='hidden'; $('modalRoot').innerHTML=''; }
function backupTodayJSON(){
 const today=todayEntries();
 const backup={version:'CleanOps V8.1.2 Daily Workflow Management',type:'today-backup',property:'Karma Tara Residency',backupTime:new Date().toISOString(),entries:today};
 const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
 downloadBlob(blob,'cleanops_today_backup_'+new Date().toISOString().slice(0,10)+'.json');
 showToast('Today backup downloaded');
}
function confirmClearToday(){
 const count=todayEntries().length;
 if(!count){closeModal();return showToast('No today data to clear')}
 if(!confirm('Final confirmation: clear today data now? Please make sure backup is downloaded.')) return;
 entries=entries.filter(e=>!isTodayEntry(e));
 persist(); closeModal(); showToast('Today data cleared'); renderDashboard();
}

function renderReports(){const today=todayEntries(),issues=entries.filter(hasIssue);$('content').innerHTML=`<div class="card"><h2>Reports</h2><p class="small">Housekeeping and issue activity.</p><div class="top-actions"><button class="btn smallbtn" onclick="renderReportList('all')">All</button><button class="btn secondary smallbtn" onclick="renderReportList('today')">Today</button><button class="btn warn smallbtn" onclick="renderReportList('issues')">Issues</button><button class="btn secondary smallbtn" onclick="exportCSV()">Excel CSV</button></div></div><div id="reportList">${entryList(today.slice().reverse(),'Today Reports')}</div>`}
function renderReportList(kind){let list=entries,title='All Reports';if(kind==='today'){list=todayEntries();title='Today Reports'}if(kind==='issues'){list=entries.filter(hasIssue);title='Issue Reports'}$('reportList').innerHTML=entryList(list.slice().reverse(),title)}
function entryList(list,title){if(!list.length)return `<div class="card"><h3>${title||'Reports'}</h3><div class="empty">No entries yet.</div></div>`;return `<div class="card">${title?`<h3>${title}</h3>`:''}${list.map(e=>`<div class="entry ${hasIssue(e)?'issue':''}"><div class="entry-title">${esc(e.location)} <span class="small">(${esc(e.type)})</span></div><div class="small">Staff: ${esc(e.staff)} · ${new Date(e.time).toLocaleString()}</div><div>${(e.status||[]).map(s=>`<span class="badge ${s==='Issue'?'issue':''}">${esc(s)}</span>`).join('')}</div>${(e.tasks||[]).length?`<p><b>Tasks:</b> ${e.tasks.map(esc).join(', ')}</p>`:''}${(e.issues||[]).length?`<p><b>Issues:</b> ${e.issues.map(esc).join(', ')}</p>`:''}${e.note?`<p><b>Note:</b> ${esc(e.note)}</p>`:''}${e.photo?`<img class="photo-preview" src="${e.photo}" alt="Attached photo">`:''}</div>`).join('')}</div>`}
function renderStaff(){$('content').innerHTML=`<div class="card"><h2>Staff & PIN Management</h2><p class="small">Admin-only. Add, edit, remove staff and manage PINs.</p><div class="add-row staff"><input id="staffNameInput" placeholder="Staff name"><select id="staffRoleInput"><option>Staff</option><option>Supervisor</option><option>Admin</option></select><input id="staffPinInput" placeholder="4-digit PIN" maxlength="4" inputmode="numeric"><button class="btn smallbtn" onclick="addStaff()">Add</button></div><div class="staff-list">${users.map((u,i)=>`<div class="staff-card"><div><strong>${esc(u.name)}</strong><div class="small">${esc(u.role)}</div></div><div class="row"><div class="pin-badge">PIN ${esc(u.pin)}</div><button class="btn secondary smallbtn" onclick="editStaff(${i})">Edit</button><button class="btn danger smallbtn" onclick="deleteStaff(${i})">Remove</button></div></div>`).join('')}</div></div>`}
function addStaff(){const name=$('staffNameInput').value.trim(),role=$('staffRoleInput').value,pin=$('staffPinInput').value.trim();if(!name||!pin)return showToast('Enter staff name and PIN');if(!/^[0-9]{4}$/.test(pin))return showToast('PIN must be 4 digits');users.push({name,role,pin});persist();fillUsers();renderStaff();showToast('Staff added')} function editStaff(i){const u=users[i];const name=prompt('Staff name',u.name);if(!name||!name.trim())return;const role=prompt('Role: Admin, Supervisor, Staff',u.role);if(!role||!role.trim())return;const pin=prompt('4-digit PIN',u.pin);if(!pin||!/^[0-9]{4}$/.test(pin))return showToast('PIN must be 4 digits');users[i]={name:name.trim(),role:role.trim(),pin};persist();fillUsers();renderStaff();showToast('Staff updated')} function deleteStaff(i){if(users.length<=1)return showToast('At least one user required');if(confirm('Remove this staff?')){users.splice(i,1);persist();fillUsers();renderStaff();showToast('Staff removed')}}
function staffSetupBlock(){return `<h3>Staff & PINs</h3><div class="add-row staff"><input id="staffNameInput" placeholder="Staff name"><select id="staffRoleInput"><option>Staff</option><option>Supervisor</option><option>Admin</option></select><input id="staffPinInput" placeholder="4-digit PIN" maxlength="4" inputmode="numeric"><button class="btn smallbtn" onclick="addStaffFromSetup()">Add</button></div><div class="staff-list">${users.map((u,i)=>`<div class="staff-card"><div><strong>${esc(u.name)}</strong><div class="small">${esc(u.role)}</div></div><div class="row"><div class="pin-badge">PIN ${esc(u.pin)}</div><button class="btn secondary smallbtn" onclick="editStaffSetup(${i})">Edit</button><button class="btn danger smallbtn" onclick="deleteStaffSetup(${i})">Remove</button></div></div>`).join('')}</div>`}
function addStaffFromSetup(){const name=$('staffNameInput').value.trim(),role=$('staffRoleInput').value,pin=$('staffPinInput').value.trim();if(!name||!pin)return showToast('Enter staff name and PIN');if(!/^[0-9]{4}$/.test(pin))return showToast('PIN must be 4 digits');users.push({name,role,pin});persist();fillUsers();renderSetup();showToast('Staff added')}
function editStaffSetup(i){const u=users[i];const name=prompt('Staff name',u.name);if(!name||!name.trim())return;const role=prompt('Role: Admin, Supervisor, Staff',u.role);if(!role||!role.trim())return;const pin=prompt('4-digit PIN',u.pin);if(!pin||!/^[0-9]{4}$/.test(pin))return showToast('PIN must be 4 digits');users[i]={name:name.trim(),role:role.trim(),pin};persist();fillUsers();renderSetup();showToast('Staff updated')}
function deleteStaffSetup(i){if(users.length<=1)return showToast('At least one user required');if(confirm('Remove this staff?')){users.splice(i,1);persist();fillUsers();renderSetup();showToast('Staff removed')}}

function renderSetup(){$('content').innerHTML=`<div class="card"><h2>Setup</h2><p class="small">Admin manages staff, rooms, areas, and separate task/issue lists.</p><div>${staffSetupBlock()}</div><div class="setup-grid"><div>${setupBlock('Suite Rooms','rooms')}</div><div>${setupBlock('Common Areas','areas')}</div><div>${setupBlock('Suite Room Tasks','suiteTasks')}</div><div>${setupBlock('Suite Room Issues','suiteIssues')}</div><div>${setupBlock('Common Area Tasks','areaTasks')}</div><div>${setupBlock('Common Area Issues','areaIssues')}</div></div></div>`}
function getSetupList(type){return type==='rooms'?rooms:type==='areas'?areas:type==='suiteTasks'?suiteTasks:type==='suiteIssues'?suiteIssues:type==='areaTasks'?areaTasks:areaIssues} function setupBlock(title,type){const list=getSetupList(type),label=type==='rooms'?'suite room':type==='areas'?'common area':type.includes('Tasks')?'task':'issue';return `<h3>${title}</h3><div class="add-row"><input id="${type}Input" placeholder="Add new ${label}"><button class="btn smallbtn" onclick="addItem('${type}')">Add</button></div><div class="setup-list">${list.map((x,i)=>`<div class="setup-card"><strong>${esc(x)}</strong><div class="row"><button class="btn secondary smallbtn" onclick="editItem('${type}',${i})">Edit</button><button class="btn danger smallbtn" onclick="deleteItem('${type}',${i})">Delete</button></div></div>`).join('')}</div>`}
function addItem(type){const el=$(type+'Input'),val=el.value.trim();if(!val)return showToast('Please enter name');const list=getSetupList(type);if(list.some(x=>x.toLowerCase()===val.toLowerCase()))return showToast('Already exists');list.push(val);persist();renderSetup()} function editItem(type,i){const list=getSetupList(type),val=prompt('Edit name',list[i]);if(!val||!val.trim())return;list[i]=val.trim();persist();renderSetup()} function deleteItem(type,i){const list=getSetupList(type);if(confirm('Delete this item?')){list.splice(i,1);persist();renderSetup()}}
function renderSave(){$('content').innerHTML=`<div class="card"><h2>Save / Backup</h2><p class="small">Backup, restore, print, and export operational data.</p><div class="top-actions"><button class="btn" onclick="backupJSON()">Backup JSON</button><button class="btn secondary" onclick="restoreInput.click()">Restore JSON</button><button class="btn warn" onclick="printDashboard()">Print / Save PDF</button><button class="btn secondary" onclick="exportCSV()">Excel CSV</button></div><input id="restoreInput" class="hidden" type="file" accept="application/json,.json" onchange="restoreJSON(event)"><div class="device-note"><b>V8.1 safeguards:</b> PWA files included, compact interface, navigation protection, kiosk-safe layout, and local data continuity using V7.3.1.2 storage keys.</div></div>`}
function collectData(){return {version:'CleanOps V8.1.2 Daily Workflow Management',base:'CleanOps V7.3.1.2 Stable Task Issue Logic Rebuild',property:'Karma Tara Residency',users,rooms,areas,suiteTasks,suiteIssues,areaTasks,areaIssues,entries,backupTime:new Date().toISOString()}}
function backupJSON(){const blob=new Blob([JSON.stringify(collectData(),null,2)],{type:'application/json'});downloadBlob(blob,'cleanops_v81_backup_'+new Date().toISOString().slice(0,10)+'.json');showToast('Backup downloaded')} function restoreJSON(event){const file=event.target.files&&event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=e=>{try{const data=JSON.parse(e.target.result);if(data.users)users=data.users;if(data.rooms)rooms=data.rooms;if(data.areas)areas=data.areas;if(data.suiteTasks)suiteTasks=data.suiteTasks;if(data.suiteIssues)suiteIssues=data.suiteIssues;if(data.areaTasks)areaTasks=data.areaTasks;if(data.areaIssues)areaIssues=data.areaIssues;if(data.entries)entries=data.entries;persist();fillUsers();showToast('Backup restored');go('dashboard')}catch(err){showToast('Invalid backup file')}};reader.readAsText(file);event.target.value=''} function printDashboard(){go('dashboard');setTimeout(()=>window.print(),250)}
function exportCSV(){const rows=[['Time','Staff','Role','Type','Location','Status','Tasks','Issues','Note'],...entries.map(e=>[new Date(e.time).toLocaleString(),e.staff,e.role,e.type,e.location,(e.status||[]).join('|'),(e.tasks||[]).join('|'),(e.issues||[]).join('|'),e.note||''])];const csv=rows.map(r=>r.map(v=>'"'+String(v??'').replace(/"/g,'""')+'"').join(',')).join('\n');downloadBlob(new Blob([csv],{type:'text/csv;charset=utf-8'}),'cleanops_report_'+new Date().toISOString().slice(0,10)+'.csv');showToast('Excel CSV downloaded')} function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),500)}
let navigationProtected=false;function protectNavigation(){if(navigationProtected)return;navigationProtected=true;try{history.replaceState({cleanops:true},'',location.href);history.pushState({cleanops:true},'',location.href)}catch(e){} window.addEventListener('popstate',()=>{if(currentUser){try{history.pushState({cleanops:true},'',location.href)}catch(e){} showToast('CleanOps device mode protected');renderContent()} }); window.addEventListener('pageshow',()=>{const saved=sessionStorage.getItem('cleanops_v7312_user');if(saved&&!currentUser){currentUser=JSON.parse(saved);startApp()}}); document.addEventListener('visibilitychange',()=>{if(!document.hidden&&currentUser){renderTabs();renderContent()}})}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
fillUsers();const saved=sessionStorage.getItem('cleanops_v7312_user');if(saved){try{currentUser=JSON.parse(saved);startApp()}catch(e){sessionStorage.removeItem('cleanops_v7312_user')}}
</script>
</body>
